<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        <header>
            <img src="{{ '/assets/images/Photo Profil - Ronald Laforet.jpg' | relative_url }}" 
                 alt="Ronald Laforet" class="profile-img">
            <h1>{{ site.author_name }}</h1>
            <div class="tagline">{{ site.tagline }}</div>
            <nav>
                <a href="{{ '/' | relative_url }}">_accueil</a>
                <a href="{{ '/cv' | relative_url }}">_parcours</a>
            </nav>
        </header>

        {{ content }}

        <footer>
            Architecturé par {{ site.author_name }} // {% echo "now" | date: "%Y" %}
        </footer>
    </div>
</body>
</html>
